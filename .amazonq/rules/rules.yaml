version: 3.0
workflow: simplified

lanes:
  fast:
    max_files: 5
    max_total_lines: 50
    target_branch: dev
    require_operator_approval: true
    require_operator_test: false
    allowed:
      - ui/text/style changes
      - small local handlers
      - documentation
      - simple config
    forbidden:
      - api/contracts
      - migrations
      - security/secrets
      - critical_performance
      - workflows/.github
      - deploy/infra/scripts
  full:
    target_branch: dev
    sync_before_start: true
    require_operator_approval: true
    require_operator_test: true
    merge_to_main_after_test: true
    push_to_github_after_merge: true

approval:
  tokens:
    - "✅"
    - "sim"
    - "aprovado"
  test_tokens:
    - "✅ testado ok"
    - "aprovado para merge"

agent_behavior:
  required_responses:
    - "## Investigação"
    - "## Plano"
    - "## Pedido de aprovação: Posso prosseguir? ✅/❌"
  hard_stops:
    before_execution: true
    never_implement_without_approval: true
  checklist:
    - check_operator_approval_received: true
    - check_amazonq_not_versioned: true
    - check_diary_updated: true
    - check_quick_check_passed: true
    - check_operator_test_passed_for_full: true

conventions:
  diary_file: ".amazonq/rules/diario_de_bordo.md"
  no_github_actions: true
  direct_commits: true
  all_tasks_need_approval: true
