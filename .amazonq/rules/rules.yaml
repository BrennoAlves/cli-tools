version: 2.4
lanes:
  fast:
    max_files: 5
    max_total_lines: 50
    require_pr: false
    require_operator_test: false
    allowed:
      - ui/text/style changes
      - small local handlers
      - documentation
      - simple config
    forbidden:
      - api/contracts
      - migrations
      - security/secrets
      - critical_performance
      - workflows/.github
      - deploy/infra/scripts
  full:
    require_pr: true
    require_operator_test: true
    pr_label: "lane: full"

approval:
  tokens:
    - "✅"
    - "aprovado"
  test_tokens:
    - "✅ testado ok"
    - "aprovado para PR"

agent_behavior:
  required_responses:
    - "## Investigação"
    - "## Plano"
    - "## Pedido de aprovação: Posso prosseguir? ✅/❌"
    - "## Plano de Testes (se via completa)"
    - "## Pedido de aprovação de testes: Pronto para testar? ✅/❌ (via completa)"
  hard_stops:
    before_execution: true
    before_opening_pr: true
  main_branch:
    fast_lane_never_merge: true
    only_full_lane_or_explicit_request: true

conventions:
  diary_file: ".amazonq/rules/diario_de_bordo.md"
  scratch_folder: "scratch/"
  code_patterns:
    - "**/*.py"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.sh"
    - "**/*.go"
    - "**/*.rs"
